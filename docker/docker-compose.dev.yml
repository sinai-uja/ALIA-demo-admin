services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    env_file:
      - ../.env
    environment:
      - LOG_LEVEL=DEBUG
    volumes:
      - ../backend:/app/backend
      - ../chroma_db:/app/chroma_db
      - ../docs:/app/docs
      - ../urls.txt:/app/urls.txt
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - ujaenagent-dev

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "frontend/app.py"]
    ports:
      - "7863:7860"
    env_file:
      - ../.env
    environment:
      - BACKEND_URL=http://backend:8000
      - GRADIO_SERVER_PORT=7860
    volumes:
      - ../frontend:/app/frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ujaenagent-dev

  frontend-eval:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "frontend/eval_app.py"]
    ports:
      - "7864:7861"
    env_file:
      - ../.env
    environment:
      - BACKEND_URL=http://backend:8000
      - GRADIO_EVAL_SERVER_PORT=7861
    volumes:
      - ../frontend:/app/frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ujaenagent-dev

networks:
  ujaenagent-dev:
    name: ujaenagent-dev
