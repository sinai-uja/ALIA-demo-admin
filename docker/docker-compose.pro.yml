services:
  backend:
    image: ${DOCKERHUB_USERNAME:-ujaenagent}/ujaenagent:${TAG:-latest}
    ports:
      - "8002:8000"
    env_file:
      - ../.env
    environment:
      - LOG_LEVEL=WARNING
    volumes:
      - ujaenagent-pro-chroma:/app/chroma_db
      - ujaenagent-pro-logs:/app/logs
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ujaenagent-pro

  frontend:
    image: ${DOCKERHUB_USERNAME:-ujaenagent}/ujaenagent:${TAG:-latest}
    command: ["python", "frontend/app.py"]
    ports:
      - "7862:7860"
    env_file:
      - ../.env
    environment:
      - BACKEND_URL=http://backend:8000
      - GRADIO_SERVER_PORT=7860
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ujaenagent-pro

  frontend-eval:
    image: ${DOCKERHUB_USERNAME:-ujaenagent}/ujaenagent:${TAG:-latest}
    command: ["python", "frontend/eval_app.py"]
    ports:
      - "7863:7861"
    env_file:
      - ../.env
    environment:
      - BACKEND_URL=http://backend:8000
      - GRADIO_EVAL_SERVER_PORT=7861
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ujaenagent-pro

volumes:
  ujaenagent-pro-chroma:
  ujaenagent-pro-logs:

networks:
  ujaenagent-pro:
    name: ujaenagent-pro
