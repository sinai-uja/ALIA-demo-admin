services:
  backend:
    image: ${DOCKERHUB_USERNAME:-ujaenagent}/ujaenagent:${TAG:-pre-latest}
    ports:
      - "8004:8000"
    env_file:
      - ../.env
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - ujaenagent-pre-chroma:/app/chroma_db
      - ujaenagent-pre-logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 5
    networks:
      - ujaenagent-pre

  frontend:
    image: ${DOCKERHUB_USERNAME:-ujaenagent}/ujaenagent:${TAG:-pre-latest}
    command: ["python", "frontend/app.py"]
    ports:
      - "7864:7860"
    env_file:
      - ../.env
    environment:
      - BACKEND_URL=http://backend:8000
      - GRADIO_SERVER_PORT=7860
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ujaenagent-pre

  frontend-eval:
    image: ${DOCKERHUB_USERNAME:-ujaenagent}/ujaenagent:${TAG:-pre-latest}
    command: ["python", "frontend/eval_app.py"]
    ports:
      - "7865:7861"
    env_file:
      - ../.env
    environment:
      - BACKEND_URL=http://backend:8000
      - GRADIO_EVAL_SERVER_PORT=7861
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ujaenagent-pre

volumes:
  ujaenagent-pre-chroma:
  ujaenagent-pre-logs:

networks:
  ujaenagent-pre:
    name: ujaenagent-pre
