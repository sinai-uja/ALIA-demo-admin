services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root mlflow-artifacts:/
      --static-prefix /mlflow-ui
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,localhost:5001,127.0.0.1,127.0.0.1:5001,0.0.0.0,0.0.0.0:5000
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/mlflow-ui/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - ujaenagent-local

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=DEBUG
      - ALIA_LLM_URL=http://host.docker.internal:12021/v1
      - ALIA_LLM_URL_2=http://host.docker.internal:12022/v1
      - EMBEDDING_MODEL_PATH=/models/MrBERT
      - EMBEDDING_DEVICE=cpu
      - TRAMITES_RERANKER_PATH=/models/cross-encoder-ms-marco-MiniLM-L6
      - TRAMITES_DATA_PATH=/app/data/export.json
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - ./chroma_db:/app/chroma_db
      - ./docs:/app/docs
      - ./data:/app/data
      - ./logs:/app/logs
      # Rutas locales a los modelos UJA (MrBERT + cross-encoder). Configura
      # MODELS_HOST_PATH en tu .env apuntando al directorio que los contiene.
      # Estructura esperada:
      #   $MODELS_HOST_PATH/MrBERT/
      #   $MODELS_HOST_PATH/cross-encoder-ms-marco-MiniLM-L6/
      - ${MODELS_HOST_PATH:?Define MODELS_HOST_PATH en .env}/MrBERT:/models/MrBERT:ro
      - ${MODELS_HOST_PATH}/cross-encoder-ms-marco-MiniLM-L6:/models/cross-encoder-ms-marco-MiniLM-L6:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - ujaenagent-local

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "frontend/app.py"]
    ports:
      - "7862:7860"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
      - GRADIO_SERVER_PORT=7860
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXTERNAL_URL=/mlflow-ui
    volumes:
      - ./frontend:/app/frontend
      - ./diseno/Logos:/app/diseno/Logos:ro
    # Override del HEALTHCHECK del Dockerfile (compartido con backend, que
    # sondea localhost:8000/health — puerto que el frontend no usa). /config
    # es el endpoint de Gradio que sólo responde 200 cuando Blocks está
    # inicializado, así que es un signal más fuerte que /.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/config"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ujaenagent-local

  frontend-eval:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "frontend/eval_app.py"]
    ports:
      - "7863:7861"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
      - GRADIO_EVAL_SERVER_PORT=7861
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./frontend:/app/frontend
      - ./diseno/Logos:/app/diseno/Logos:ro
    # Override del HEALTHCHECK del Dockerfile — ver explicación en `frontend`.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7861/config"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ujaenagent-local

networks:
  ujaenagent-local:
    name: ujaenagent-local
